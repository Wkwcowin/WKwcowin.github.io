{% if page.meta.comments %}
  <h2 id="__comments">{{ lang.t("meta.comments") }}</h2>
  
  <!-- Twikoo 评论系统 -->
  <div id="tcomment"></div>
  
  <script>
  (function() {
    function loadTwikoo() {
      if (window.twikoo) {
        initTwikoo();
        return;
      }
      
      const script = document.createElement('script');
      script.src = 'https://registry.npmmirror.com/twikoo/1.7.9/files/dist/twikoo.min.js';
      script.onload = initTwikoo;
      document.head.appendChild(script);
    }
    
    function initTwikoo() {
      twikoo.init({
        envId: 'https://superb-salamander-e730b6.netlify.app/.netlify/functions/twikoo',
        el: '#tcomment',
        lang: 'zh-CN',
        path: location.pathname
      });
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadTwikoo);
    } else {
      loadTwikoo();
    }
  })();
  </script>
{% endif %}
